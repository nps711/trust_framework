spring:
  application:
    name: trust-file-service
  datasource:
    url: jdbc:h2:mem:filedb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8092

trust:
  file:
    storage:
      type: local
      path: ${user.home}/trust-file-storage

management:
  endpoints:
    web:
      exposure:
        include: health,info
