spring:
  application:
    name: trust-auth-service
  datasource:
    url: jdbc:h2:mem:authdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jackson:
    default-property-inclusion: non_null

server:
  port: 8090

trust:
  auth:
    jwt:
      secret: "trust-framework-jwt-secret-key-change-in-production"
      access-token-expire: 7200000
      refresh-token-expire: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info
