spring.application.name=trust-auth-service
spring.datasource.url=jdbc:h2:mem:authdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jackson.default-property-inclusion=non_null
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.banner=false
server.port=8090
trust.auth.jwt.secret=trust-framework-jwt-secret-key-change-in-production
trust.auth.jwt.access-token-expire=7200000
trust.auth.jwt.refresh-token-expire=604800000
management.endpoints.web.exposure.include=health,info
