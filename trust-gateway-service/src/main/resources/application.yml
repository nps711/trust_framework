spring:
  application:
    name: trust-gateway-service
  cloud:
    gateway:
      routes:
        - id: quant-trade-service
          uri: http://localhost:8087
          predicates:
            - Path=/quant/trade/**
          filters:
            - RewritePath=/quant/trade/(?<segment>.*), /quant/${segment}
        - id: quant-account-service
          uri: http://localhost:8091
          predicates:
            - Path=/quant/account/**
        - id: quant-quotation-service
          uri: http://localhost:8088
          predicates:
            - Path=/quant/quotation/**
        - id: auth-service
          uri: http://localhost:8090
          predicates:
            - Path=/auth/**
        - id: file-service
          uri: http://localhost:8092
          predicates:
            - Path=/file/**
        - id: audit-service
          uri: http://localhost:8093
          predicates:
            - Path=/audit/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
