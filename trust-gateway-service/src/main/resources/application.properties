spring.application.name=trust-gateway-service
spring.cloud.gateway.routes[0].id=quant-trade-service
spring.cloud.gateway.routes[0].uri=http://localhost:8087
spring.cloud.gateway.routes[0].predicates[0]=Path=/quant/trade/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/quant/trade/(?<segment>.*), /quant/${segment}
spring.cloud.gateway.routes[1].id=quant-account-service
spring.cloud.gateway.routes[1].uri=http://localhost:8091
spring.cloud.gateway.routes[1].predicates[0]=Path=/quant/account/**
spring.cloud.gateway.routes[2].id=quant-quotation-service
spring.cloud.gateway.routes[2].uri=http://localhost:8088
spring.cloud.gateway.routes[2].predicates[0]=Path=/quant/quotation/**
spring.cloud.gateway.routes[3].id=auth-service
spring.cloud.gateway.routes[3].uri=http://localhost:8090
spring.cloud.gateway.routes[3].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[4].id=file-service
spring.cloud.gateway.routes[4].uri=http://localhost:8092
spring.cloud.gateway.routes[4].predicates[0]=Path=/file/**
spring.cloud.gateway.routes[5].id=audit-service
spring.cloud.gateway.routes[5].uri=http://localhost:8093
spring.cloud.gateway.routes[5].predicates[0]=Path=/audit/**
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=false
management.endpoints.web.exposure.include=health,info
