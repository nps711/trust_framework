spring:
  application:
    name: trust-audit-service
  datasource:
    url: jdbc:h2:mem:auditdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jackson:
    default-property-inclusion: non_null
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: auto

server:
  port: 8093

management:
  endpoints:
    web:
      exposure:
        include: health,info
